<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=820, initial-scale=1" />
  <title>Aurelian Massage — Facebook page preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #1a1a1a;
      padding: 24px;
      color: #1c1e21;
    }
    .preview-note {
      color: #b0b3b8;
      font-size: 12px;
      margin-bottom: 12px;
    }
    /* Facebook-style frame */
    .fb-page {
      width: 820px;
      margin: 0 auto;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    /* Cover photo — Facebook recommended 820 x 312 */
    .cover-wrap {
      position: relative;
      width: 820px;
      height: 312px;
      background: #20152e;
      overflow: hidden;
    }
    .cover-bg {
      position: absolute;
      inset: -10%;
      background-image: url('./therapist-hero.png');
      background-size: cover;
      background-position: center 30%;
    }
    .cover-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(32,21,46,0.75) 0%, rgba(32,21,46,0.5) 55%, rgba(122,80,176,0.4) 100%);
    }
    /* Profile picture area — overlaps cover bottom-left, 170px circle */
    .profile-wrap {
      position: absolute;
      left: 24px;
      bottom: -40px;
      z-index: 2;
    }
    .profile-circle {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      border: 4px solid #fff;
      overflow: hidden;
      background: #20152e;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .profile-circle img {
      width: 88%;
      height: 88%;
      object-fit: contain;
    }
    /* Page name bar below cover */
    .page-name-bar {
      height: 70px;
      padding: 12px 24px 12px 210px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: #fff;
      border-bottom: 1px solid #dddfe2;
    }
    .page-name {
      font-size: 28px;
      font-weight: 700;
      color: #1c1e21;
    }
    .page-meta {
      font-size: 14px;
      color: #65676b;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <p class="preview-note">Screenshot the box below. Open this file from the <code>public</code> folder, or run the site and visit <strong>/facebook-page-preview.html</strong>.</p>
  <div class="fb-page">
    <div class="cover-wrap">
      <div class="cover-bg" aria-hidden="true"></div>
      <div class="cover-overlay" aria-hidden="true"></div>
      <div class="profile-wrap">
        <div class="profile-circle">
          <img src="./logo.svg" alt="Aurelian Massage" />
        </div>
      </div>
    </div>
    <div class="page-name-bar">
      <span class="page-name">Aurelian Massage</span>
      <span class="page-meta">Massage spa · Bath</span>
    </div>
  </div>
</body>
</html>
